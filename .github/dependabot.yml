version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      time: "22:00"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - npm
    groups:
      npm-dev:
        dependency-type: development
        update-types:
          - minor
          - patch
        patterns:
          - "*"
      npm-prod:
        dependency-type: production
        update-types:
          - minor
          - patch
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: "22:00"
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
